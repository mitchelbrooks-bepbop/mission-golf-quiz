  {b:"Accessories",cat:"Add-ons",q:"What does a floor-mounted gun rack cost?",o:["$75","$125","$175","$225"],a:1,x:"A floor-mounted gun rack is $125. A scabbards single option is $225. Popular in rural and outdoor communities."},
  {b:"Accessories",cat:"Add-ons",q:"What does undercoating cost?",o:["$150","$200","$250","$300"],a:2,x:"Undercoating is $250. Powdercoating struts is $800 — a premium finish for a fully custom look."},
  {b:"Accessories",cat:"Add-ons",q:"What does a unique key switch cost?",o:["$50","$65","$75","$95"],a:2,x:"A unique key switch is $75 — useful for communities or rental fleets where cart owners want differentiated keys."},
  {b:"Accessories",cat:"Add-ons",q:"What does the M&M Golf Bag Attachment cost?",o:["$150","$275","$415","$650"],a:2,x:"The M&M Bag Attachment is $415. The Liberty Bag Rack is $650 and the GTW Bag Attachment is $150 — know these for golf-focused buyers."},

  // ── ALL BRANDS / SCENARIOS ──
  {b:"All Brands",cat:"Powertrain",q:"Which of the three brands does NOT offer a gas-powered option?",o:["Club Car","E-Z-GO","Denago EV","All three offer gas"],a:2,x:"Denago EV is electric-only. Both Club Car and E-Z-GO offer gas powertrains alongside their electric models."},
  {b:"All Brands",cat:"Seating",q:"A customer needs to seat 6 people. Which models across all three brands work?",o:["Club Car Onward 6, Denago Rover XL6, E-Z-GO Express 6","Club Car Onward 4, Denago Nomad XL, E-Z-GO RXV 4","No brand offers a 6-passenger option","Only E-Z-GO offers a 6-passenger cart"],a:0,x:"All three brands have 6-passenger options: Club Car Onward 6 ($15,799), Denago Rover XL6 (32-mile range, 4+2), and E-Z-GO Express 6 (gas or electric, from $11,849)."},
  {b:"All Brands",cat:"Add-ons",q:"Which brand offers Apple CarPlay/Android Auto as a standard feature on all models?",o:["Club Car (lithium models only)","E-Z-GO (top trims only)","Denago EV (standard across the lineup)","None of the brands offer this"],a:2,x:"Denago EV includes Apple CarPlay and Android Auto standard. E-Z-GO offers a 10\" screen only on upper trims. Club Car's 7\" screen is lithium-model exclusive."},
  {b:"All Brands",cat:"Specs",q:"Which statement about lifted vs. non-lifted carts is correct?",o:["Non-lifted carts are better for off-road terrain","Lifted carts have higher ground clearance, larger tires, and handle uneven terrain better","Lifted carts are always electric-only","Lifting a cart reduces top speed below 10 mph"],a:1,x:"Lifted carts offer superior ground clearance and larger tires for uneven terrain. Non-lifted is better for flat pavement with a lower step-in height."},
  {b:"All Brands",cat:"Scenario",q:"A customer says they want the lowest-maintenance electric cart with the best warranty. Which brand do you lead with?",o:["E-Z-GO — ELiTE Lithium cells","Club Car — lithium with 7\" screen","Denago EV — lifetime chassis, 8-year battery, LiFePO₄ chemistry","All three are identical on maintenance"],a:2,x:"Denago EV wins on warranty: lifetime aluminum chassis and 8-year battery. LiFePO₄ is among the safest and longest-lasting lithium chemistries."},
  {b:"All Brands",cat:"Scenario",q:"A customer asks which brand gives the most technology standard without paying extra. Best answer?",o:["Club Car — the 7\" screen is on all models","E-Z-GO — IntelliBrake is always included","Denago EV — Apple CarPlay, Android Auto, and LiFePO₄ battery all standard","All three are identical on standard tech"],a:2,x:"Denago EV bundles the most tech standard: Apple CarPlay, Android Auto, LiFePO₄ battery with 8-year warranty, and lifetime chassis warranty — no trim upgrade needed."},
  {b:"All Brands",cat:"Scenario",q:"A neighborhood buyer asks what the main difference is between an LSV and a standard golf cart. What do you say?",o:["An LSV is just a golf cart with a fancier name","An LSV is federally regulated, reaches 25 mph, and is street-legal on roads posted 35 mph or less with required safety features","An LSV is always gas powered","An LSV can reach 45 mph on highways"],a:1,x:"An LSV reaches 25 mph, requires seatbelts, mirrors, VIN, and DOT-approved lighting, and is legal on roads posted 35 mph or less. Club Car (Onward LSV) and E-Z-GO (Liberty) both offer LSV models."},
  {b:"All Brands",cat:"Scenario",q:"A customer is choosing between a Club Car Onward gas and lithium-electric model. What are the two biggest reasons to go lithium?",o:["Lithium is cheaper and faster","Lithium unlocks the 7\" digital display and wireless charging, and has zero-maintenance battery","Lithium models have a higher top speed","Lithium models come in more colors"],a:1,x:"The two biggest lithium upsides on Club Car: (1) exclusive 7\" touchscreen with speed/battery display and dual wireless charging pads, and (2) zero-maintenance battery with no watering or acid checks."},
  {b:"All Brands",cat:"Scenario",q:"How does soundbar pricing differ between E-Z-GO and Club Car?",o:["E-Z-GO soundbar is $782; Club Car is free","Club Car does not offer a Soundbar attachment","Mission charges the same for both brands at $782","Neither brand offers a soundbar add-on"],a:2,x:"Mission Golf Cars can add Premium Sound Bar to Club Car or EZ-GO Cars for $782 as a standalone add-on. Denago EV offers a SoundBar on all Standard Models."},
  {b:"All Brands",cat:"Scenario",q:"A resort wants to know the daily pricing difference between 4-passenger and 6-passenger cart rentals. What is it?",o:["They cost the same","6-passenger is $25/day more","6-passenger is $50/day more","6-passenger is $100/day more"],a:2,x:"4-passenger daily is $150; 6-passenger daily is $200 — exactly $50 more. Use this when guests are deciding between sizes."},
  {b:"All Brands",cat:"Scenario",q:"A customer is buying a Club Car for street use in their gated community. Which add-ons are most essential?",o:["Brush guard and fender flares","DOT windshield ($456), seat belts ($150), SMV sign ($30), and unique key switch ($75)","Sound bar and premium canopy","Gun racks and cooler rack"],a:1,x:"For community LSV street use: DOT windshield ($456), seat belts ($150), SMV sign ($30), and unique key switch ($75) — $711 in safety-related add-ons."},
  {b:"All Brands",cat:"Scenario",q:"A customer buying a Club Car for off-road use asks what accessories to add. What's the best bundle?",o:["Sound bar and garage opener","Factory lift or 6\" kit + brush guard + fender flares + all-terrain tires with Multi-Seal","DOT windshield + seat belts + SMV sign","Rain enclosure + rear locking trunk"],a:1,x:"For off-road: factory lift (or $400 kit), brush guard ($455), fender flares ($377), and Multi-Seal for all-terrain tires ($200). Roughly $1,032–$1,432 depending on approach."},
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let deck = [], cur = 0, score = 0, answered = false;
const tally = { "Club Car":[0,0], "Denago EV":[0,0], "E-Z-GO":[0,0], "Rentals":[0,0], "Accessories":[0,0], "All Brands":[0,0] };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── BRAND COLORS ─────────────────────────────────────────────────────────────
const brandMeta = {
  "Club Car":   { bg:"bg-blue-50",   text:"text-blue-700",   border:"border-blue-200"  },
  "Denago EV":  { bg:"bg-emerald-50",text:"text-emerald-700",border:"border-emerald-200"},
  "E-Z-GO":     { bg:"bg-amber-50",  text:"text-amber-700",  border:"border-amber-200" },
  "Rentals":    { bg:"bg-purple-50", text:"text-purple-700", border:"border-purple-200"},
  "Accessories":{ bg:"bg-rose-50",   text:"text-rose-700",   border:"border-rose-200"  },
  "All Brands": { bg:"bg-slate-100", text:"text-slate-600",  border:"border-slate-200" },
};
const catColor = {
  "Seating":"bg-indigo-50 text-indigo-700",
  "Powertrain":"bg-teal-50 text-teal-700",
  "Pricing":"bg-amber-50 text-amber-700",
  "Add-ons":"bg-rose-50 text-rose-700",
  "Specs":"bg-sky-50 text-sky-700",
  "Rental Rate":"bg-violet-50 text-violet-700",
  "Scenario":"bg-orange-50 text-orange-700",
};

// ─── RENDER ───────────────────────────────────────────────────────────────────
function init(reset = true) {
  deck = shuffle(ALL);
  cur = 0; score = 0; answered = false;
  if (reset) Object.keys(tally).forEach(k => tally[k] = [0, 0]);
  updateProgress();
  render();
}

function updateProgress() {
  const pct = deck.length ? Math.round((cur / deck.length) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-counter').textContent = cur < deck.length
    ? `Question ${cur + 1} of ${deck.length}`
    : `Complete`;
  document.getElementById('score-num').textContent = score;
}

function render() {
  if (cur >= deck.length) { showResults(); return; }
  const q = deck[cur];
  const bm = brandMeta[q.b] || brandMeta["All Brands"];
  const cc = catColor[q.cat] || "bg-slate-100 text-slate-600";

  const opts = q.o.map((opt, i) => `
    <button
      id="opt-${i}"
      onclick="choose(${i})"
      class="opt-btn w-full text-left px-4 py-3.5 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 hover:border-slate-300 text-slate-800 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-turf-400 focus:ring-offset-1"
    >${opt}</button>
  `).join('');

  document.getElementById('quiz-body').innerHTML = `
    <div class="q-wrap">
      <div class="flex flex-wrap items-center gap-2 mb-4">
        <span class="brand-pill inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold border ${bm.bg} ${bm.text} ${bm.border}">${q.b}</span>
        <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold ${cc}">${q.cat}</span>
      </div>
      <p class="text-slate-900 text-base font-semibold leading-snug mb-5">${q.q}</p>
      <div id="options-grid" class="flex flex-col gap-2.5">${opts}</div>
      <div id="feedback" class="hidden feedback-box mt-4"></div>
      <div class="mt-5">
        <button
          id="next-btn"
          onclick="nextQ()"
          class="hidden items-center gap-1.5 px-5 py-3 rounded-xl bg-turf-600 hover:bg-turf-700 active:bg-turf-800 text-white text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-turf-400"
        >${cur === deck.length - 1 ? 'See results' : 'Next question'} <span class="enter-label opacity-70 text-xs">(Enter)</span></button>
      </div>
    </div>
  `;
  answered = false;
  updateProgress();
  // Scroll card into view on mobile when a new question loads
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = deck[cur];
  const isRight = idx === q.a;
  const t = tally[q.b] || tally["All Brands"];
  if (isRight) { score++; t[0]++; } else { t[1]++; }

  document.getElementById('score-num').textContent = score;

  // Style all buttons
  q.o.forEach((_, i) => {
    const btn = document.getElementById(`opt-${i}`);
    btn.disabled = true;
    if (i === q.a) {
      btn.className = "opt-btn w-full text-left px-4 py-3.5 rounded-xl border text-sm font-semibold bg-turf-50 border-turf-400 text-turf-800 animate-pop";
      btn.innerHTML = `<span class="inline-flex items-center gap-2"><span class="text-turf-500">✓</span>${q.o[i]}</span>`;
    } else if (i === idx && !isRight) {
      btn.className = "opt-btn w-full text-left px-4 py-3.5 rounded-xl border text-sm font-semibold bg-red-50 border-red-300 text-red-700 animate-shake";
      btn.innerHTML = `<span class="inline-flex items-center gap-2"><span class="text-red-400">✗</span>${q.o[i]}</span>`;
    } else {
      btn.className = "opt-btn w-full text-left px-4 py-3.5 rounded-xl border text-sm font-medium bg-white border-slate-150 text-slate-400";
    }
  });

  // Feedback
  const fb = document.getElementById('feedback');
  fb.className = isRight
    ? 'feedback-box mt-4 p-4 rounded-xl bg-turf-50 border border-turf-200 text-turf-900 text-sm leading-relaxed'
    : 'feedback-box mt-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-900 text-sm leading-relaxed';
  fb.innerHTML = `<span class="font-semibold">${isRight ? 'Correct! ' : 'Not quite. '}</span>${q.x}`;
  fb.classList.remove('hidden');

  // Show next button
  const nb = document.getElementById('next-btn');
  nb.classList.remove('hidden');
  nb.classList.add('flex');

  // On mobile, scroll so the feedback + next button are visible
  setTimeout(() => {
    nb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 150);
}

function nextQ() {
  cur++;
  render();
}

// ─── ENTER KEY ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!answered) return;
  const nb = document.getElementById('next-btn');
  if (nb && !nb.classList.contains('hidden')) nextQ();
});

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function showResults() {
  const pct = Math.round((score / deck.length) * 100);
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('q-counter').textContent = 'Complete';

  let gradeLabel, gradeStyle, msg;
  if (pct >= 90) { gradeLabel = 'A'; gradeStyle = 'bg-turf-50 text-turf-700 border-turf-300'; msg = "Outstanding. You're almost a good as Mitch, The Intern in Buda, and you are ready to handle any customer question on the floor."; }
  else if (pct >= 75) { gradeLabel = 'B'; gradeStyle = 'bg-blue-50 text-blue-700 border-blue-200'; msg = "Strong product knowledge. Review a few specifics and you're set."; }
  else if (pct >= 60) { gradeLabel = 'C'; gradeStyle = 'bg-amber-50 text-amber-700 border-amber-200'; msg = "Good foundation. Focus on pricing differences and accessory costs."; }
  else { gradeLabel = 'D'; gradeStyle = 'bg-red-50 text-red-700 border-red-200'; msg = "Keep practicing — review brand differentiators, rental tiers, and add-on pricing."; }

  const breakdownCards = Object.entries(tally).map(([brand, [right, wrong]]) => {
    const total = right + wrong;
    if (!total) return '';
    const bpct = Math.round((right / total) * 100);
    const bm = brandMeta[brand] || brandMeta["All Brands"];
    return `
      <div class="flex flex-col gap-1 p-3 rounded-xl border ${bm.border} ${bm.bg}">
        <span class="text-xs font-semibold ${bm.text}">${brand}</span>
        <span class="text-xl font-bold text-slate-800">${right}<span class="text-sm font-normal text-slate-400">/${total}</span></span>
        <div class="w-full bg-white rounded-full h-1.5 overflow-hidden">
          <div class="h-1.5 rounded-full bg-current ${bm.text} opacity-60" style="width:${bpct}%"></div>
        </div>
        <span class="text-xs text-slate-500">${bpct}%</span>
      </div>`;
  }).join('');

  document.getElementById('quiz-body').innerHTML = `
    <div class="results-wrap text-center py-4">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl border-2 ${gradeStyle} mb-4">
        <span class="font-display text-3xl font-bold">${gradeLabel}</span>
      </div>
      <div class="text-4xl font-display font-bold text-slate-900 mb-1">${score}<span class="text-xl font-normal text-slate-400"> / ${deck.length}</span></div>
      <div class="text-2xl font-semibold text-slate-500 mb-3">${pct}%</div>
      <p class="text-sm text-slate-500 max-w-sm mx-auto mb-8 leading-relaxed">${msg}</p>

      <div class="text-left mb-6">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Breakdown by brand</p>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">${breakdownCards}</div>
      </div>

      <button
        onclick="init(true)"
        class="w-full py-3.5 rounded-xl bg-slate-900 hover:bg-slate-800 active:bg-slate-700 text-white text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-slate-400"
      >Retake with new order</button>
    </div>
  `;
  document.getElementById('enter-hint').style.display = 'none';
}

// ─── KICK OFF ─────────────────────────────────────────────────────────────────
init(true);
</script>
</body>
</html>
